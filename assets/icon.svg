<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b3150"/>
      <stop offset="1" stop-color="#171a2b"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9fdcff"/>
      <stop offset="1" stop-color="#4fb0ff"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff9a6b"/>
      <stop offset="1" stop-color="#f2603f"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#bg)"/>

  <g filter="url(#soft)" fill="none" stroke="url(#wave)" stroke-width="30" stroke-linecap="round">
    <!-- three wifi arcs, centred on the dot, opening upward -->
    <path d="M107,244 A210 210 0 0 1 405,244"/>
    <path d="M157,294 A140 140 0 0 1 355,294"/>
    <path d="M207,344 A70 70 0 0 1 305,344"/>
  </g>
  <!-- source dot -->
  <circle cx="256" cy="372" r="26" fill="url(#warm)" filter="url(#soft)"/>
</svg>
